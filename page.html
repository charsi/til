<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{ .Title }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/charsi/steel.css/steel.min.css" />
  </head>
  <body>
    {{ if eq .Path "index.html" }}
      <ul>
        {{ range .Pages }}
          <li>
            <a href="{{ .URL }}">{{ .Title }}</a> &mdash;
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 Jan 2006" }}</time>
          </li>
        {{ end }}
      </ul>
    {{ else }}
      <h1>{{ .Title }}</h1>
      {{ .Content }}
      <p>
        <a href="/">Home</a>
      </p>
    {{ end }}
  </body>
</html>
